function diasLab(d1,d2){
    let n=0,c=new Date(d1);
    while(c<=d2){if(c.getDay()>0&&c.getDay()<6)n++;c.setDate(c.getDate()+1);}
    return n;
  }

  fases.forEach(f=>{
    const esKO=f.fase.toLowerCase().includes('kick');
    f.subtasks.forEach(t=>{
      const ini=new Date(t.ini),fin=new Date(t.fin);
      const h=esKO?8/Math.max(f.subtasks.length,1):diasLab(ini,fin)*8.4;
      totalPV+=h;
      const finEv=fin<=hoy?fin:hoy;
      if(ini<=hoy){
        const hEv=esKO?h:diasLab(ini,finEv<ini?ini:finEv)*8.4;
        totalEV+=Math.min(hEv,h)*t.av;
      }
    });
  });

  if(totalPV===0)return null;
  const pctEV=Math.min(totalPV>0?totalEV/totalPV*100:0,100);
  const ko=new Date(cat.kickoff);
  const hoyMs=hoy.getTime();
  const semAt=Math.max(Math.floor((hoyMs-ko.getTime())/(7*86400000)),0);
  const pctPV=totalPV>0?Math.min(semAt/26*100,100):0;
  const spit=pctPV>0?pctEV/pctPV:0;
  const svt=pctEV-pctPV;
  let estado='Atrasado';
  const due=cat.due?new Date(cat.due):null;
  if(pctEV>=100)estado='Terminado';
  else if(svt>2)estado='Adelantado';
  else if(due&&hoy>due&&pctEV<100)estado='Vencido';
  else if(svt<-2)estado='Atrasado';
  else estado='Adelantado';

  return {ev:Math.round(pctEV*10)/10,spit:Math.round(spit*100)/100,sv:Math.round(svt*10)/10,estado};
}

function init(){
  const ts=document.getElementById('ts');
  const m=document.querySelector('meta[name="updated"]');

  // Stats
  const results=CATALOGO.map(c=>({...c,...(calcProj(c)||{ev:0,spit:0,sv:0,estado:'Atrasado'})}));
  document.getElementById('s-total').textContent=results.length;
  document.getElementById('s-adel').textContent=results.filter(r=>r.estado==='Adelantado').length;
  document.getElementById('s-atra').textContent=results.filter(r=>r.estado==='Atrasado').length;
  document.getElementById('s-venc').textContent=results.filter(r=>r.estado==='Vencido').length;
  document.getElementById('s-term').textContent=results.filter(r=>r.estado==='Terminado').length;

  window._results=results;
  renderCards();
}

function renderCards(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const grid=document.getElementById('grid');
  const data=window._results||[];
  const pc=ev=>ev>=80?'#16a34a':ev>=50?'#d97706':'#dc2626';

  const filtered=data.filter(p=>{
    const mQ=!q||p.name.toLowerCase().includes(q);
    const mF=filtro==='Todos'||p.estado===filtro;
    return mQ&&mF;
  });

  if(!filtered.length){
    grid.innerHTML='<div class="empty">No se encontraron proyectos</div>';
    return;
  }

  grid.innerHTML=filtered.map(p=>`
    <div class="card ${p.estado}">
      <div class="pname">${p.name}</div>
      <div class="pmeta">
        📅 KO: ${p.kickoff||'—'} &nbsp;·&nbsp; 🚚 EXW: ${p.due||'—'}<br>
        📊 EV: ${p.ev}% &nbsp;·&nbsp; SPI: ${p.spit.toFixed(2)} &nbsp;·&nbsp; SV: ${p.sv>0?'+':''}${p.sv.toFixed(1)}%
      </div>
      <div class="pbar"><div class="pbarf" style="width:${p.ev}%;background:${pc(p.ev)}"></div></div>
      <span class="badge b-${p.estado}">${p.estado}</span>
    </div>
  `).join('');
}
