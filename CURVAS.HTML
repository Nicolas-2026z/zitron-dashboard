<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Curva S — Portafolio Zitron</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
.topbar{background:#0f2240;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.brand{font-family:monospace;font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:1px}
.meta{font-family:monospace;font-size:10px;color:rgba(255,255,255,0.4)}
.body{padding:16px;max-width:1400px;margin:0 auto}
.filtros{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbtn{font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid #cbd5e1;background:#fff;color:#475569;cursor:pointer;font-family:monospace}
.fbtn.act{background:#0f2240;color:#fff;border-color:#0f2240}
.search{flex:1;min-width:200px;max-width:320px;border:1px solid #cbd5e1;border-radius:8px;padding:6px 12px;font-size:13px;background:#fff;outline:none}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:12px 14px;border-left:3px solid #0f2240}
.stat .sl{font-size:10px;color:#64748b;font-family:monospace;margin-bottom:2px}
.stat .sv{font-size:22px;font-weight:600;color:#0f2240}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px;border-left:4px solid #cbd5e1;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card.Adelantado{border-left-color:#16a34a}
.card.Atrasado{border-left-color:#d97706}
.card.Vencido{border-left-color:#dc2626}
.card.Terminado{border-left-color:#7c3aed}
.pname{font-size:12px;font-weight:600;margin-bottom:6px;color:#0f172a;line-height:1.4}
.pmeta{font-size:10px;color:#64748b;font-family:monospace;line-height:1.8}
.pbar{height:5px;background:#f1f5f9;border-radius:3px;margin-top:9px;overflow:hidden}
.pbarf{height:5px;border-radius:3px}
.badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;margin-top:7px;font-family:monospace}
.b-Adelantado{background:#dcfce7;color:#15803d}
.b-Atrasado{background:#fef3c7;color:#b45309}
.b-Vencido{background:#fee2e2;color:#b91c1c}
.b-Terminado{background:#f3e8ff;color:#7c3aed}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f2240,#1e3a62)}
.lcard{background:#fff;border-radius:16px;padding:36px 32px;width:320px;text-align:center}
.logo{width:52px;height:52px;background:#0f2240;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:monospace;font-size:22px;font-weight:700;color:#fff}
.lt{font-size:17px;font-weight:600;color:#0f2240;margin-bottom:4px}
.ls{font-size:12px;color:#64748b;margin-bottom:24px}
.linput{width:100%;border:1.5px solid #e2e8f0;border-radius:9px;padding:11px 14px;font-size:14px;text-align:center;letter-spacing:3px;outline:none;margin-bottom:12px}
.lbtn{width:100%;background:#0f2240;color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.lerr{color:#dc2626;font-size:11px;margin-top:8px;min-height:16px}
.empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px;grid-column:1/-1}
/* MODAL */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;overflow-y:auto;padding:20px}
.overlay.open{display:block}
.modal{background:#fff;border-radius:14px;max-width:900px;margin:0 auto;padding:20px;position:relative}
.mclose{position:absolute;top:14px;right:14px;background:#f1f5f9;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px;color:#64748b}
.mtitle{font-size:14px;font-weight:600;color:#0f2240;margin-bottom:4px}
.msub{font-size:10px;color:#64748b;font-family:monospace;margin-bottom:14px}
.mkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.mkpi{background:#f8fafc;border-radius:8px;padding:10px 12px;border:0.5px solid #e2e8f0}
.mkl{font-size:9px;color:#64748b;font-family:monospace;letter-spacing:.5px;margin-bottom:3px}
.mkv{font-size:18px;font-weight:600}
.mdev{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.mdc{background:#f8fafc;border-radius:8px;padding:10px 12px;border:0.5px solid #e2e8f0}
.mdl{font-size:9px;color:#64748b;font-family:monospace;margin-bottom:3px}
.mdv{font-size:14px;font-weight:600}
.msec{background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:12px}
.msh{font-size:10px;font-weight:700;color:#0f2240;font-family:monospace;letter-spacing:.5px;margin-bottom:10px}
.chart-wrap{position:relative;height:200px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#0f2240;color:#fff;padding:7px 10px;text-align:center;font-family:monospace;font-size:9px;letter-spacing:.3px}
td{padding:6px 10px;border-bottom:0.5px solid #f1f5f9;text-align:center;color:#0f172a}
tr:hover td{background:#f8fafc}
.tok{color:#16a34a;font-weight:600}
.tmal{color:#dc2626;font-weight:600}
.tna{color:#94a3b8}
</style>
</head>
<body>

<div id="loginWrap" class="login">
  <div class="lcard">
    <div class="logo">Z</div>
    <div class="lt">Portafolio — Curva S</div>
    <div class="ls">Zitron · Acceso privado</div>
    <input class="linput" type="password" id="pwd" placeholder="Contraseña" />
    <button class="lbtn" onclick="login()">Ingresar</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="main" style="display:none">
  <div class="topbar">
    <div class="brand">// CURVA S · PORTAFOLIO ZITRON</div>
    <div class="meta" id="ts"><!-- updated: 2026-07-04 --></div>
  </div>
  <div class="body">
    <div class="stats">
      <div class="stat"><div class="sl">PROYECTOS</div><div class="sv" id="s-total">0</div></div>
      <div class="stat"><div class="sl">ADELANTADOS</div><div class="sv" style="color:#16a34a" id="s-adel">0</div></div>
      <div class="stat"><div class="sl">ATRASADOS</div><div class="sv" style="color:#d97706" id="s-atra">0</div></div>
      <div class="stat"><div class="sl">VENCIDOS</div><div class="sv" style="color:#dc2626" id="s-venc">0</div></div>
      <div class="stat"><div class="sl">TERMINADOS</div><div class="sv" style="color:#7c3aed" id="s-term">0</div></div>
    </div>
    <div class="filtros">
      <input class="search" type="text" id="q" placeholder="Buscar proyecto..." oninput="renderCards()">
      <button class="fbtn act" onclick="setF('Todos',this)">Todos</button>
      <button class="fbtn" onclick="setF('Adelantado',this)">✅ Adelantado</button>
      <button class="fbtn" onclick="setF('Atrasado',this)">⚠️ Atrasado</button>
      <button class="fbtn" onclick="setF('Vencido',this)">🔴 Vencido</button>
      <button class="fbtn" onclick="setF('Terminado',this)">✓ Terminado</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="mclose" onclick="closeOverlay()">✕</button>
    <div class="mtitle" id="m-title"></div>
    <div class="msub" id="m-sub"></div>
    <div class="mkpis">
      <div class="mkpi"><div class="mkl">EV %</div><div class="mkv" id="m-ev" style="color:#16a34a"></div></div>
      <div class="mkpi"><div class="mkl">PV %</div><div class="mkv" id="m-pv" style="color:#2563eb"></div></div>
      <div class="mkpi"><div class="mkl">SPI</div><div class="mkv" id="m-spi"></div></div>
      <div class="mkpi"><div class="mkl">SV %</div><div class="mkv" id="m-sv"></div></div>
    </div>
    <div class="mdev">
      <div class="mdc"><div class="mdl">SV HORAS</div><div class="mdv" id="m-svh"></div></div>
      <div class="mdc"><div class="mdl">SV DÍAS (8.3h)</div><div class="mdv" id="m-svd"></div></div>
      <div class="mdc"><div class="mdl">AT SEMANAS</div><div class="mdv" id="m-at"></div></div>
    </div>
    <div class="msec">
      <div class="msh">CURVA S — PV vs EV ACUMULADO (%)</div>
      <div class="chart-wrap"><canvas id="chartModal" role="img" aria-label="Curva S"></canvas></div>
    </div>
    <div class="msec">
      <div class="msh">DETALLE POR SEMANA</div>
      <div style="overflow-x:auto"><table id="tbl-sem"></table></div>
    </div>
    <div class="msec">
      <div class="msh">TAREAS DEL PROYECTO</div>
      <div style="overflow-x:auto"><table id="tbl-tar"></table></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const PWD='zitron2026!';
const DEMO={};
const CATALOGO=[];

var filtro='Todos';
var _results=[];
var _chart=null;

// Calendario semanas domingo-sabado
var SEMANAS_CAL=[];
(function(){
  var base=new Date(2025,11,28); // domingo 28 dic 2025
  var pvs=[0,1,3,5,7,9,11,13,15,16,18,20,22,24,26,28,30,32,34,36,38,39,41,43,45,47,49,51,53,55,57,59,61,62,64,66,68,70,72,74,76,78,80,82,84,85,87,89,91,93,95,97,100];
  for(var i=0;i<53;i++){
    var ini=new Date(base.getTime()+i*7*86400000);
    var fin=new Date(ini.getTime()+6*86400000);
    SEMANAS_CAL.push({n:i+1,ini:ini,fin:fin,pv:pvs[i]||100});
  }
})();

function fmtD(d){
  if(!d)return'—';
  var dd=new Date(d);
  return dd.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function semanaDeDate(d){
  var dd=new Date(d);
  for(var i=0;i<SEMANAS_CAL.length;i++){
    if(dd>=SEMANAS_CAL[i].ini&&dd<=SEMANAS_CAL[i].fin) return SEMANAS_CAL[i].n;
  }
  return null;
}

function login(){
  var val=document.getElementById('pwd').value;
  if(val===PWD){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('main').style.display='block';
    init();
  } else {
    document.getElementById('lerr').textContent='Contraseña incorrecta';
    document.getElementById('pwd').value='';
  }
}
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')login();});

function setF(f,btn){
  filtro=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  renderCards();
}

function diasLab(d1,d2){
  var n=0,c=new Date(d1.getTime());
  while(c<=d2){if(c.getDay()>0&&c.getDay()<6)n++;c.setDate(c.getDate()+1);}
  return n;
}

function calcProj(cat){
  var fases=DEMO[cat.gid]?DEMO[cat.gid].fases:[];
  var totalPV=0,totalEV=0,pvHoy=0;
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var nKO=0;
  fases.forEach(function(f){if(f.fase.toLowerCase().indexOf('kick')>=0)nKO+=f.subtasks.length;});
  nKO=Math.max(nKO,1);

  fases.forEach(function(f){
    var esKO=f.fase.toLowerCase().indexOf('kick')>=0;
    f.subtasks.forEach(function(t){
      var ini=new Date(t.ini),fin=new Date(t.fin);
      var h=esKO?8.3/nKO:diasLab(ini,fin)*8.3;
      totalPV+=h;
      if(fin<=hoy)pvHoy+=h;
      else if(ini<=hoy)pvHoy+=diasLab(ini,hoy)*8.3;
      if(ini<=hoy){
        var finEv=fin<=hoy?fin:hoy;
        var hEv=esKO?h:diasLab(ini,finEv<ini?ini:finEv)*8.3;
        totalEV+=Math.min(hEv,h)*t.av;
      }
    });
  });

  if(totalPV===0)return null;
  var pctEV=Math.min(totalEV/totalPV*100,100);
  var pctPV=Math.min(pvHoy/totalPV*100,100);
  var spi=pctPV>0?pctEV/pctPV:0;
  var svt=pctEV-pctPV;
  var svH=totalEV-pvHoy;
  var ko=new Date(cat.kickoff);
  var at=Math.max(Math.floor((hoy.getTime()-ko.getTime())/(7*86400000)),0);
  var estado='Atrasado';
  var due=cat.due?new Date(cat.due):null;
  if(pctEV>=100)estado='Terminado';
  else if(svt>2)estado='Adelantado';
  else if(due&&hoy>due&&pctEV<100)estado='Vencido';
  else if(svt>=-2)estado='Adelantado';

  return{
    ev:Math.round(pctEV*10)/10,
    pv:Math.round(pctPV*10)/10,
    spi:Math.round(spi*100)/100,
    sv:Math.round(svt*10)/10,
    svH:Math.round(svH),
    svD:Math.round(svH/8.3*10)/10,
    at:at,
    totalPV:Math.round(totalPV),
    totalEV:Math.round(totalEV),
    estado:estado,
    fases:fases,
    totalPVraw:totalPV
  };
}

function calcSemanas(p,fases,totalPV){
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var nKO=0;
  fases.forEach(function(f){if(f.fase.toLowerCase().indexOf('kick')>=0)nKO+=f.subtasks.length;});
  nKO=Math.max(nKO,1);

  var rows=[];
  SEMANAS_CAL.forEach(function(s){
    var pvSem=0,evSem=0;
    fases.forEach(function(f){
      var esKO=f.fase.toLowerCase().indexOf('kick')>=0;
      f.subtasks.forEach(function(t){
        var ini=new Date(t.ini),fin=new Date(t.fin);
        var h=esKO?8.3/nKO:diasLab(ini,fin)*8.3;
        // PV de esta semana
        var ds=new Date(Math.max(ini.getTime(),s.ini.getTime()));
        var df=new Date(Math.min(fin.getTime(),s.fin.getTime()));
        if(ds<=df){
          var dTot=diasLab(ini,fin)||1;
          var dSem=diasLab(ds,df);
          pvSem+=esKO?h:(dSem/dTot)*h;
        }
        // EV solo si semana ya pasó
        if(s.fin<=hoy){
          var finEv=fin<=s.fin?fin:s.fin;
          if(ini<=s.fin){
            var ds2=new Date(Math.max(ini.getTime(),s.ini.getTime()));
            var df2=new Date(Math.min(finEv.getTime(),s.fin.getTime()));
            if(ds2<=df2){
              var dTot2=diasLab(ini,finEv)||1;
              var dSem2=diasLab(ds2,df2);
              evSem+=esKO?h*t.av:(dSem2/dTot2)*h*t.av;
            }
          }
        }
      });
    });
    rows.push({n:s.n,ini:s.ini,fin:s.fin,pvCal:s.pv,pvSem:Math.round(pvSem*10)/10,evSem:Math.round(evSem*10)/10,pasada:s.fin<=hoy});
  });

  // Acumulados
  var pvA=0,evA=0;
  rows.forEach(function(r){
    pvA+=r.pvSem; evA+=r.evSem;
    r.pvA=Math.round(pvA/totalPV*1000)/10;
    r.evA=Math.round(evA/totalPV*1000)/10;
  });
  return rows;
}

function init(){
  _results=CATALOGO.map(function(c){
    var p=calcProj(c)||{ev:0,pv:0,spi:0,sv:0,svH:0,svD:0,at:0,totalPV:0,totalEV:0,estado:'Atrasado',fases:[],totalPVraw:1};
    return{gid:c.gid,name:c.name,kickoff:c.kickoff,due:c.due,finReal:c.finReal,
           ev:p.ev,pv:p.pv,spi:p.spi,sv:p.sv,svH:p.svH,svD:p.svD,at:p.at,
           totalPV:p.totalPV,totalEV:p.totalEV,estado:p.estado,fases:p.fases,totalPVraw:p.totalPVraw};
  });
  document.getElementById('s-total').textContent=_results.length;
  document.getElementById('s-adel').textContent=_results.filter(function(r){return r.estado==='Adelantado';}).length;
  document.getElementById('s-atra').textContent=_results.filter(function(r){return r.estado==='Atrasado';}).length;
  document.getElementById('s-venc').textContent=_results.filter(function(r){return r.estado==='Vencido';}).length;
  document.getElementById('s-term').textContent=_results.filter(function(r){return r.estado==='Terminado';}).length;
  renderCards();
}

function renderCards(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var grid=document.getElementById('grid');
  var filtered=_results.filter(function(p){
    return(!q||p.name.toLowerCase().indexOf(q)>=0)&&(filtro==='Todos'||p.estado===filtro);
  });
  if(!filtered.length){grid.innerHTML='<div class="empty">No se encontraron proyectos</div>';return;}
  var html='';
  filtered.forEach(function(p){
    var pc=p.ev>=80?'#16a34a':p.ev>=50?'#d97706':'#dc2626';
    var sv=p.sv>0?'+'+p.sv.toFixed(1):p.sv.toFixed(1);
    html+='<div class="card '+p.estado+'" onclick="openModal(\''+p.gid+'\')">';
    html+='<div class="pname">'+p.name+'</div>';
    html+='<div class="pmeta">KO: '+p.kickoff+' &nbsp;·&nbsp; EXW: '+(p.due||'—')+'<br>';
    html+='EV: '+p.ev+'% &nbsp;·&nbsp; SPI: '+p.spi.toFixed(2)+' &nbsp;·&nbsp; SV: '+sv+'%</div>';
    html+='<div class="pbar"><div class="pbarf" style="width:'+p.ev+'%;background:'+pc+'"></div></div>';
    html+='<span class="badge b-'+p.estado+'">'+p.estado+'</span></div>';
  });
  grid.innerHTML=html;
}

function openModal(gid){
  var p=null;
  for(var i=0;i<_results.length;i++){if(_results[i].gid===gid){p=_results[i];break;}}
  if(!p)return;

  document.getElementById('m-title').textContent=p.name;
  document.getElementById('m-sub').textContent='KO: '+p.kickoff+' · EXW: '+(p.due||'—')+' · Fin real: '+(p.finReal||'—');

  var sc=p.spi>=1?'#16a34a':p.spi>=0.7?'#d97706':'#dc2626';
  var svc=p.sv>=0?'#16a34a':'#dc2626';
  document.getElementById('m-ev').textContent=p.ev+'%';
  document.getElementById('m-pv').textContent=p.pv+'%';
  document.getElementById('m-spi').style.color=sc;
  document.getElementById('m-spi').textContent=p.spi.toFixed(2);
  document.getElementById('m-sv').style.color=svc;
  document.getElementById('m-sv').textContent=(p.sv>0?'+':'')+p.sv.toFixed(1)+'%';
  document.getElementById('m-svh').style.color=svc;
  document.getElementById('m-svh').textContent=(p.svH>0?'+':'')+p.svH+' h';
  document.getElementById('m-svd').style.color=svc;
  document.getElementById('m-svd').textContent=(p.svD>0?'+':'')+p.svD+' d';
  document.getElementById('m-at').textContent=p.at+' sem';

  // Calcular semanas
  var sems=calcSemanas(p,p.fases,p.totalPVraw||1);
  var semsConDatos=sems.filter(function(s){return s.pvSem>0||s.pasada;});

  // Gráfico
  if(_chart){_chart.destroy();}
  var labels=semsConDatos.map(function(s){return'S'+s.n;});
  var pvData=semsConDatos.map(function(s){return s.pvCal;});
  var evData=semsConDatos.map(function(s){return s.pasada?s.evA:null;});
  _chart=new Chart(document.getElementById('chartModal'),{
    type:'line',
    data:{labels:labels,datasets:[
      {label:'PV',data:pvData,borderColor:'#2563eb',borderWidth:2,borderDash:[6,3],pointRadius:0,fill:false,tension:0.3},
      {label:'EV',data:evData,borderColor:'#16a34a',borderWidth:2.5,pointRadius:0,fill:false,tension:0.3,spanGaps:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{size:9},maxTicksLimit:10}},
        y:{min:0,max:100,grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{size:9},callback:function(v){return v+'%'}}}
      }
    }
  });

  // Tabla semanas
  var hSem='<tr><th>Sem</th><th>Inicio</th><th>Fin</th><th>PV Cal %</th><th>PV Acum %</th><th>EV Acum %</th><th>Estado</th></tr>';
  var rowsSem='';
  semsConDatos.forEach(function(s){
    if(!s.pasada&&s.pvSem===0)return;
    var est='';
    if(s.pasada){
      var diff=s.evA-s.pvCal;
      est=diff>=0?'<span class="tok">✓ OK</span>':'<span class="tmal">✗ Atraso</span>';
    } else {
      est='<span class="tna">→ Pendiente</span>';
    }
    rowsSem+='<tr><td>S'+s.n+'</td><td>'+s.ini.toLocaleDateString('es-CL')+'</td><td>'+s.fin.toLocaleDateString('es-CL')+'</td>';
    rowsSem+='<td>'+s.pvCal+'%</td><td>'+s.pvA+'%</td><td>'+(s.pasada?s.evA+'%':'—')+'</td><td>'+est+'</td></tr>';
  });
  document.getElementById('tbl-sem').innerHTML=hSem+rowsSem;

  // Tabla tareas
  var hTar='<tr><th>Fase</th><th>Tarea</th><th>Semana</th><th>Inicio</th><th>Fin Plan</th><th>Avance</th><th>Completada</th></tr>';
  var rowsTar='';
  p.fases.forEach(function(f){
    f.subtasks.forEach(function(t){
      var semN=semanaDeDate(t.ini);
      var semStr=semN?'S'+semN:'—';
      var av=Math.round(t.av*100);
      var avc=av>=100?'tok':av>0?'':'tna';
      var comp=t.av>=1?fmtD(t.fin):'—';
      rowsTar+='<tr><td style="text-align:left">'+f.fase+'</td>';
      rowsTar+='<td style="text-align:left">'+t.name+'</td>';
      rowsTar+='<td>'+semStr+'</td>';
      rowsTar+='<td>'+fmtD(t.ini)+'</td>';
      rowsTar+='<td>'+fmtD(t.fin)+'</td>';
      rowsTar+='<td><span class="'+avc+'">'+av+'%</span></td>';
      rowsTar+='<td>'+comp+'</td></tr>';
    });
  });
  document.getElementById('tbl-tar').innerHTML=hTar+rowsTar;

  document.getElementById('overlay').classList.add('open');
}

function closeOverlay(){document.getElementById('overlay').classList.remove('open');}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeOverlay();}
</script>
</body>
</html>
