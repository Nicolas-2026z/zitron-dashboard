<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Datos de Costeo – Zitrón</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f1117;color:#e8eaf0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  button{cursor:pointer;font-family:inherit}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* LOGIN */
  #login{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:linear-gradient(135deg,#1a1d2e,#16213e);border:1px solid #2a2d3e;border-radius:20px;padding:44px 40px;width:360px;box-shadow:0 20px 60px #00000060;transition:border-color .3s,box-shadow .3s}
  .login-box.error{border-color:#e74c3c;box-shadow:0 0 30px #e74c3c30;animation:shake .4s}
  .logo-wrap{text-align:center;margin-bottom:32px}
  .logo-img{width:72px;height:72px;border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;padding:6px;box-shadow:0 4px 20px #0008}
  .login-title{font-size:19px;font-weight:700;color:#e8eaf0}
  .login-sub{font-size:12px;color:#8892b0;margin-top:6px}
  .input-wrap{position:relative;margin-bottom:16px}
  .input-wrap input{width:100%;padding:12px 44px 12px 16px;border-radius:10px;background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
  .input-wrap input:focus{border-color:#3498db}
  .input-wrap input.err{border-color:#e74c3c}
  .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#8892b0;font-size:16px;user-select:none}
  .err-msg{color:#e74c3c;font-size:12px;text-align:center;margin-bottom:12px}
  .btn-login{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#3498db,#1abc9c);color:#fff;font-weight:700;font-size:15px;transition:opacity .2s}
  .btn-login:hover{opacity:.88}

  /* HEADER */
  #header{background:linear-gradient(135deg,#1a1d2e,#16213e);border-bottom:1px solid #2a2d3e;padding:18px 28px;display:flex;align-items:center;gap:14px}
  .hlogo{width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:3px;box-shadow:0 2px 10px #0006}
  .htitle{font-size:17px;font-weight:700;letter-spacing:.3px}
  .hsub{font-size:11px;color:#8892b0;margin-top:1px}
  #btn-back{margin-left:auto;background:rgba(255,255,255,.07);border:1px solid #2a2d3e;color:#8892b0;border-radius:8px;padding:5px 14px;font-size:12px;display:none}
  #btn-back:hover{color:#e8eaf0}

  /* MAIN */
  #main{padding:24px 28px;max-width:1100px;margin:0 auto;animation:fadeIn .25s}

  /* CATEGORÍAS */
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:16px}
  .cat-card{background:linear-gradient(135deg,#1a1d2e,#16213e);border:1px solid transparent;border-radius:14px;padding:22px 20px;color:#e8eaf0;text-align:left;transition:all .18s;position:relative;overflow:hidden}
  .cat-card:hover{transform:translateY(-2px)}
  .cat-icon{font-size:28px;margin-bottom:10px}
  .cat-name{font-weight:700;font-size:14px;margin-bottom:4px}
  .cat-count{font-size:11px;color:#8892b0}
  .cat-bg{position:absolute;bottom:0;right:0;width:60px;height:60px;border-radius:50% 0 14px 0;opacity:.15}

  /* MODELOS */
  .mod-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .mod-icon{font-size:22px}
  .mod-title{margin:0;font-size:20px;font-weight:700}
  .mod-badge{background:rgba(52,152,219,.15);color:#3498db;border-radius:20px;padding:2px 12px;font-size:11px;font-weight:600;margin-left:6px}
  .mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
  .mod-card{background:#1a1d2e;border:1px solid #2a2d3e;border-radius:12px;padding:16px 14px;color:#e8eaf0;text-align:left;transition:all .15s}
  .mod-card:hover{background:#1f2235}
  .mod-cname{font-weight:700;font-size:13px;margin-bottom:6px}
  .mod-fecha{font-size:10px;color:#8892b0;margin-bottom:4px}
  .mod-pv{font-size:11px;font-weight:600;color:#2ecc71}
  .mod-ndiam{font-size:10px;color:#8892b0}

  /* DETALLE */
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#8892b0;margin-bottom:18px}
  .breadcrumb span.link{cursor:pointer}
  .info-card{border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:28px;align-items:center}
  .info-label{font-size:11px;color:#8892b0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .info-val{font-size:15px;font-weight:600}
  .info-modelo{font-size:22px;font-weight:800}
  .info-pv{font-size:22px;font-weight:800;color:#2ecc71}
  .info-clp{font-size:11px;color:#8892b0;margin-top:2px}
  .section-label{font-size:13px;font-weight:700;color:#8892b0;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
  .table-wrap{background:#1a1d2e;border-radius:14px;overflow:hidden;border:1px solid #2a2d3e;margin-bottom:20px}
  table{width:100%;border-collapse:collapse}
  thead tr{background:#16192a}
  th{padding:11px 16px;font-size:11px;color:#8892b0;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
  th.r,td.r{text-align:right}
  th.l,td.l{text-align:left}
  tbody tr{border-top:1px solid #2a2d3e;transition:background .1s}
  tbody tr:hover{background:#1f2235}
  td{padding:11px 16px;font-size:13px}
  .td-mat{font-weight:500}
  .td-num{color:#8892b0}
  .td-pv{font-weight:600;color:#2ecc71}
  .tfoot-row{border-top:2px solid #2a2d3e!important;background:#16192a}
  .tfoot-lbl{font-size:12px;font-weight:700;color:#8892b0;text-transform:uppercase}
  .tfoot-val{font-size:15px;font-weight:800;text-align:right}
  .only-pv{background:#1a1d2e;border-radius:14px;padding:24px;border:1px solid #2a2d3e;text-align:center}
  .only-pv-lbl{font-size:12px;color:#8892b0;margin-bottom:8px}
  .only-pv-val{font-size:32px;font-weight:800;color:#2ecc71}

  #app{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">

    <button class="btn-login" onclick="login()">Ingresar</button>

</div>

<!-- APP -->
<div id="app">
  <div id="header">
    <div class="hlogo">
      <svg viewBox="0 0 200 200" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 15 C52 15 15 52 15 100 C15 148 52 185 100 185 C128 185 153 172 170 151 L150 135 C137 151 120 160 100 160 C67 160 40 133 40 100 C40 67 67 40 100 40 C120 40 137 49 150 65 L170 49 C153 28 128 15 100 15 Z" fill="#009ede"/>
        <text x="108" y="128" text-anchor="middle" font-size="82" font-weight="900" font-family="Arial Black,sans-serif" fill="#009ede">Z</text>
      </svg>
    </div>
    <div>
      <div class="htitle">Base de Datos de Costeo</div>
      <div class="hsub" id="hstats"></div>
    </div>
    <button id="btn-back" onclick="goBack()">← Inicio</button>
  </div>
  <div id="main"></div>
</div>

const cats = Object.keys(DATA);
let currentCat = null;
let currentMod = null;
let showPwd = false;

function fmt(v, dec=0){
  if(v==null||isNaN(v))return "—";
  return new Intl.NumberFormat("es-CL",{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(v);
}

function toggleEye(){
  showPwd=!showPwd;
  document.getElementById('pwd').type=showPwd?'text':'password';
  document.getElementById('eyebtn').textContent=showPwd?'🙈':'👁';
}

function login(){
  const v=document.getElementById('pwd').value;
  if(v===CLAVE){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    const b=document.getElementById('lbox');
    const i=document.getElementById('pwd');
    const e=document.getElementById('errmsg');
    b.classList.add('error');i.classList.add('err');e.style.display='block';
    document.getElementById('pwd').value='';
    setTimeout(()=>{b.classList.remove('error');i.classList.remove('err');e.style.display='none';},2000);
  }
}

function initApp(){
  const total=cats.reduce((s,c)=>s+Object.keys(DATA[c]).length,0);
  document.getElementById('hstats').textContent=cats.length+' categorías · '+total+' modelos';
  renderCats();
}

function renderCats(){
  currentCat=null;currentMod=null;
  document.getElementById('btn-back').style.display='none';
  const m=document.getElementById('main');
  m.style.animation='none';requestAnimationFrame(()=>{m.style.animation='';});
  let h='<div style="font-size:13px;color:#8892b0;margin-bottom:16px">Selecciona una categoría de producto</div><div class="cat-grid">';
  cats.forEach((c,i)=>{
    const col=COLORS[i%COLORS.length];
    const n=Object.keys(DATA[c]).length;
    h+=`<button class="cat-card" onclick="renderMods('${c}')" style="border-color:${col}40" onmouseover="this.style.borderColor='${col}'" onmouseout="this.style.borderColor='${col}40'">
      <div class="cat-icon">${ICONS[c]||'◆'}</div>
      <div class="cat-name">${c}</div>
      <div class="cat-count">${n} modelos</div>
      <div class="cat-bg" style="background:${col}"></div>
    </button>`;
  });
  h+='</div>';
  m.innerHTML=h;
}

function renderMods(cat){
  currentCat=cat;currentMod=null;
  document.getElementById('btn-back').style.display='block';
  const idx=cats.indexOf(cat);
  const col=COLORS[idx%COLORS.length];
  const mods=Object.keys(DATA[cat]);
  let h=`<div class="mod-header"><span class="mod-icon">${ICONS[cat]||'◆'}</span><h2 class="mod-title">${cat}</h2><span class="mod-badge" style="background:${col}22;color:${col}">${mods.length} modelos</span></div><div class="mod-grid">`;
  mods.forEach(mod=>{
    const d=DATA[cat][mod];
    const hasDiam=d.modelos&&d.modelos.length>0;
    h+=`<button class="mod-card" onclick="renderDetalle('${cat}','${mod.replace(/'/g,"\\'")}' )" style="" onmouseover="this.style.borderColor='${col}';this.style.background='#1f2235'" onmouseout="this.style.borderColor='#2a2d3e';this.style.background='#1a1d2e'">
      <div class="mod-cname" style="color:${col}">${mod}</div>
      ${d.fecha?`<div class="mod-fecha">📅 ${d.fecha}</div>`:''}
      ${d.precio_venta?`<div class="mod-pv">USD ${fmt(d.precio_venta,2)}</div>`:''}
      ${hasDiam?`<div class="mod-ndiam">${d.modelos.length} diámetros</div>`:''}
    </button>`;
  });
  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

function goBack(){
  if(currentMod){renderMods(currentCat);}
  else{renderCats();}
}

function renderDetalle(cat,mod){
  currentMod=mod;
  const idx=cats.indexOf(cat);
  const col=COLORS[idx%COLORS.length];
  const d=DATA[cat][mod];
  const hasMat=d.materiales&&d.materiales.length>0;
  const hasDiam=d.modelos&&d.modelos.length>0;
  const totalMat=hasMat?d.materiales.reduce((s,m)=>s+(m.valor_total||0),0):0;

  let h=`<div class="breadcrumb">
    <span class="link" style="color:${col}" onclick="renderMods('${cat}')">${cat}</span>
    <span>›</span><span style="color:#e8eaf0;font-weight:600">${mod}</span>
  </div>`;

  h+=`<div class="info-card" style="background:linear-gradient(135deg,#1a1d2e,#1f2235);border:1px solid ${col}50">
    <div><div class="info-label">Modelo</div><div class="info-modelo" style="color:${col}">${mod}</div></div>
    ${d.fecha?`<div><div class="info-label">Fecha Costeo</div><div class="info-val">${d.fecha}</div></div>`:''}
    ${d.cambio?`<div><div class="info-label">Cambio CLP/USD</div><div class="info-val">$${fmt(d.cambio)}</div></div>`:''}
    ${d.precio_venta?`<div style="margin-left:auto"><div class="info-label">Precio Venta</div><div class="info-pv">USD ${fmt(d.precio_venta,2)}</div>${d.precio_nacional_clp?`<div class="info-clp">CLP ${fmt(d.precio_nacional_clp)}</div>`:''}</div>`:''}
  </div>`;

  if(hasMat){
    h+=`<div class="section-label">Materiales</div><div class="table-wrap"><table>
      <thead><tr><th class="l">Material</th><th class="r">Cantidad</th><th class="r">Precio Unit. USD</th><th class="r">Valor Total USD</th></tr></thead>
      <tbody>`;
    d.materiales.forEach(m=>{
      h+=`<tr><td class="l td-mat">${m.material}</td><td class="r td-num">${fmt(m.cantidad,2)}</td><td class="r td-num">${m.precio_unit?fmt(m.precio_unit,2):'—'}</td><td class="r" style="font-weight:600;color:${m.valor_total?'#e8eaf0':'#555'}">${m.valor_total?fmt(m.valor_total,2):'—'}</td></tr>`;
    });
    h+=`</tbody><tfoot><tr class="tfoot-row"><td colspan="3" class="l tfoot-lbl" style="padding:11px 16px">Total Materiales</td><td class="tfoot-val" style="padding:11px 16px;color:${col}">${fmt(totalMat,2)}</td></tr></tfoot></table></div>`;
  }

  if(hasDiam){
    h+=`<div class="section-label">Precios por Diámetro</div><div class="table-wrap"><table>
      <thead><tr><th class="l">Diámetro</th><th class="r">Costo USD</th><th class="r">Venta USD Nacional</th><th class="r">Venta CLP Nacional</th></tr></thead><tbody>`;
    d.modelos.filter(m=>m.costo_usd||m.venta_usd_nacional).forEach(m=>{
      h+=`<tr><td class="l" style="font-weight:600;color:${col}">${m.diametro}</td><td class="r td-num">${fmt(m.costo_usd,2)}</td><td class="r td-pv">${fmt(m.venta_usd_nacional,2)}</td><td class="r td-num">${fmt(m.venta_clp_nacional)}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }

  if(!hasMat&&!hasDiam&&d.precio_venta){
    h+=`<div class="only-pv"><div class="only-pv-lbl">PRECIO DE VENTA</div><div class="only-pv-val">USD ${fmt(d.precio_venta,2)}</div></div>`;
  }

  document.getElementById('main').innerHTML=h;
}
</script>
