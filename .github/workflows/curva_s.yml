name: Actualizar Curva S

on:
  schedule:
    - cron: '5 13 * * *'
    - cron: '5 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  actualizar-curvas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright openpyxl requests
          playwright install chromium

      - name: Restaurar sesion Asana
        env:
          ASANA_AUTH_PORTAFOLIO: ${{ secrets.ASANA_AUTH_PORTAFOLIO }}
        run: |
          echo "$ASANA_AUTH_PORTAFOLIO" > auth.json
          echo "auth.json: $(wc -c < auth.json) bytes"

      - name: Backup Excel en /tmp
        run: |
          mkdir -p /tmp/data_backup
          cp data/*.xlsx /tmp/data_backup/ 2>/dev/null || true
          COUNT=$(find /tmp/data_backup -name "*.xlsx" | wc -l)
          echo "Backup en /tmp: $COUNT Excel"

      - name: Exportar datos desde Asana
        run: python3 scripts/asana_export.py

      - name: Restaurar Excel faltantes desde /tmp
        run: |
          COUNT_NEW=$(find data -name "*.xlsx" 2>/dev/null | wc -l)
          COUNT_BCK=$(find /tmp/data_backup -name "*.xlsx" 2>/dev/null | wc -l)
          echo "Exportados: $COUNT_NEW | Backup: $COUNT_BCK"
          for f in /tmp/data_backup/*.xlsx; do
            [ -f "$f" ] || continue
            nombre=$(basename "$f")
            if [ ! -f "data/$nombre" ]; then
              echo "Restaurando: $nombre"
              cp "$f" "data/$nombre"
            fi
          done
          COUNT_FINAL=$(find data -name "*.xlsx" | wc -l)
          echo "✅ Total final: $COUNT_FINAL Excel"

      - name: Generar CURVAS.HTML
        run: python3 scripts/generar_curvas.py data CURVAS.HTML CURVAS.HTML

      - name: Asegurar .nojekyll
        run: touch .nojekyll

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CURVAS.HTML data .nojekyll
          git diff --staged --quiet || git commit -m "Curva S actualizada $(TZ='America/Santiago' date '+%Y-%m-%d %H:%M') Chile"
          git pull --rebase origin main
          git push

      - name: Forzar GitHub Pages en modo GitHub Actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' || true

      - name: Preparar sitio estatico
        run: |
          mkdir -p _site
          cp *.html _site/ 2>/dev/null || true
          cp -r docs _site/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: actualizar-curvas
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
