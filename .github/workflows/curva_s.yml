name: Actualizar Curva S

on:
  schedule:
    - cron: '5 13 * * 1-5'
    - cron: '5 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-curvas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright openpyxl requests
          playwright install chromium

      - name: Restaurar sesion Asana
        env:
          ASANA_AUTH_PORTAFOLIO: ${{ secrets.ASANA_AUTH_PORTAFOLIO }}
        run: |
          echo "$ASANA_AUTH_PORTAFOLIO" > auth.json
          echo "auth.json: $(wc -c < auth.json) bytes"

      - name: Exportar datos desde Asana
        run: python3 scripts/asana_export.py

      - name: Generar CURVAS.HTML
        run: python3 scripts/generar_curvas.py data CURVAS.HTML CURVAS.HTML

      - name: Forzar timestamp en CURVAS.HTML
        run: |
          FECHA=$(TZ="America/Santiago" date '+%d/%m/%Y %H:%M')
          sed -i "s|Última actualización:.*hrs (Chile)|Última actualización: ${FECHA} hrs (Chile)|g" CURVAS.HTML
          echo "Timestamp forzado: ${FECHA}"

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CURVAS.HTML data .nojekyll
          git diff --staged --quiet || git commit -m "Curva S actualizada $(TZ='America/Santiago' date '+%Y-%m-%d %H:%M') Chile"
          git pull --rebase origin main
          git push
