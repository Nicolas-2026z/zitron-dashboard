name: Generar Curva S
on:
  schedule:
    - cron: "*/30 11-20 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  curva_s:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install openpyxl
      - name: Generar Curva S
        run: python scripts/generar_curvas.py data curva-s-buscador.html curva-s-buscador.html
      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add curva-s-buscador.html
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "Curva S actualizada $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main
