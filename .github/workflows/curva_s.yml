name: Actualizar Curva S

on:
  schedule:
    - cron: '5 13 * * 1-5'
    - cron: '5 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-curvas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright openpyxl requests
          playwright install chromium

      - name: Restaurar sesion Asana
        env:
          ASANA_AUTH_PORTAFOLIO: ${{ secrets.ASANA_AUTH_PORTAFOLIO }}
        run: |
          echo "$ASANA_AUTH_PORTAFOLIO" > auth.json
          echo "auth.json: $(wc -c < auth.json) bytes"

      - name: Guardar copia de seguridad de data
        run: |
          cp -r data data_backup
          COUNT=$(find data_backup -name "*.xlsx" | wc -l)
          echo "Backup: $COUNT Excel guardados"

      - name: Exportar datos desde Asana
        run: python3 scripts/asana_export.py

      - name: Restaurar Excel faltantes desde backup
        run: |
          COUNT_NEW=$(find data -name "*.xlsx" 2>/dev/null | wc -l)
          COUNT_BCK=$(find data_backup -name "*.xlsx" | wc -l)
          echo "Exportados: $COUNT_NEW | Backup: $COUNT_BCK"
          for f in data_backup/*.xlsx; do
            nombre=$(basename "$f")
            if [ ! -f "data/$nombre" ]; then
              echo "Restaurando: $nombre"
              cp "$f" "data/$nombre"
            fi
          done
          COUNT_FINAL=$(find data -name "*.xlsx" | wc -l)
          echo "✅ Total final: $COUNT_FINAL Excel"

      - name: Generar CURVAS.HTML
        run: python3 scripts/generar_curvas.py data CURVAS.HTML CURVAS.HTML

      - name: Asegurar .nojekyll
        run: touch .nojekyll

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CURVAS.HTML data .nojekyll
          git diff --staged --quiet || git commit -m "Curva S actualizada $(TZ='America/Santiago' date '+%Y-%m-%d %H:%M') Chile"
          git pull --rebase origin main
          git push
