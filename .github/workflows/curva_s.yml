name: Actualizar Curva S

on:
  schedule:
    - cron: '5 13 * * 1-5'
    - cron: '5 20 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar-curvas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Exportar datos desde Asana
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python scripts/asana_export.py

      - name: Generar CURVAS.HTML
        run: python scripts/generar_curvas.py data CURVAS.HTML CURVAS.HTML

      - name: Commit y Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CURVAS.HTML
          git diff --staged --quiet || git commit -m "Curva S actualizada $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
