name: Actualizar KPI

on:
  schedule:
    - cron: '0 13 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-kpi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright openpyxl requests
          playwright install chromium

      - name: Restaurar sesion de Asana (auth.json)
        env:
          ASANA_AUTH: ${{ secrets.ASANA_AUTH }}
        run: |
          echo "$ASANA_AUTH" > auth.json
          echo "Tamaño auth.json: $(wc -c < auth.json) bytes"

      - name: Exportar datos desde Asana
        run: python3 scripts/asana_export.py

      - name: Generar KPI.HTML
        run: python3 scripts/generar_kpi.py data KPI.HTML KPI.HTML

      - name: Commit y Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add KPI.HTML data
          git diff --staged --quiet || git commit -m "KPI actualizado $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
