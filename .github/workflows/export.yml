name: Actualizar KPI

on:
  schedule:
    - cron: '0 13 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  actualizar-kpi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Exportar datos desde Asana
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python scripts/asana_export.py

      - name: Generar KPI.HTML
        run: python scripts/generar_kpi.py data KPI.HTML KPI.HTML

      - name: Commit y Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add KPI.HTML
          git diff --staged --quiet || git commit -m "KPI actualizado $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
