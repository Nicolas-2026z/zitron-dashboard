name: Actualizar Portafolio
on:
  schedule:
    - cron: "0 13 * * 1-5"   # lunes a viernes 13:00 UTC (~9am Chile UTC-4)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install playwright openpyxl
          playwright install chromium

      - name: Restaurar sesion de Asana (auth.json)
        env:
          ASANA_AUTH_PORTAFOLIO: ${{ secrets.ASANA_AUTH_PORTAFOLIO }}
        run: |
          echo "$ASANA_AUTH_PORTAFOLIO" > auth.json
          echo "Tamano auth.json: $(wc -c < auth.json) bytes"

      - name: Limpiar carpeta data anterior
        run: |
          rm -f data/*.xlsx data/*.csv
          rm -f data/servicios/*.xlsx data/servicios/*.csv
          echo "Carpetas limpiadas"

      - name: Exportar proyectos y servicios desde Asana
        run: python3 scripts/asana_export_portafolio.py

      - name: Generar index.html
        run: python3 scripts/generar_portafolio.py data data/servicios index.html

      - name: Commit y push de los cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html data
          git diff --staged --quiet || git commit -m "Actualiza portafolio $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
