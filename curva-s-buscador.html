function toggleFml(btn){
  const p=document.getElementById('fmlPanel');
  const a=btn.querySelector('.fml-arr');
  p.classList.toggle('open');
  a.textContent=p.classList.contains('open')?'▾':'▸';
}

function renderFormulas(vals){
  const v = vals;
  const clsSpi = v.spit>=1?'fml-ok':v.spit>=0.7?'fml-warn':'fml-bad';
  const clsSv  = v.svt>=0?'fml-ok':'fml-bad';
  const clsSlip= v.daysSlip<=0?'fml-ok':v.daysSlip<=14?'fml-warn':'fml-bad';
  const clsProb= v.prob>=70?'fml-ok':v.prob>=40?'fml-warn':'fml-bad';
  const hrsD   = (42/5).toFixed(1); // 8.4h/día
  const hrsT   = 8;                 // turno kick off
  const hrsK   = v.nKick>0?(hrsT/v.nKick).toFixed(2):hrsT;

  const rows = [
    {
      tag:'PV sem',
      formula:'42h ÷ N tareas activas',
      calc:'KickOff = '+hrsT+'h ÷ '+v.nKick+' tareas = '+hrsK+'h/tarea · Resto = días lab × '+hrsD+'h/día',
      desc:'Horas planificadas distribuidas entre tareas activas cada semana · Total proyecto: '+v.totalPV.toFixed(0)+' hrs',
      result:v.totalPV.toFixed(0)+' hrs',
      cls:'fml-neu'
    },
    {
      tag:'EV sem',
      formula:'PV sem × % avance tarea',
      calc:'EV acum hoy = '+v.evAcumHoy.toFixed(1)+' hrs de '+v.totalPV.toFixed(0)+' hrs totales',
      desc:'Horas realmente ganadas · campo "Avance Tarea" de Asana por cada subtarea activa',
      result:v.pctEVhoy.toFixed(1)+'%',
      cls:'fml-neu'
    },
    {
      tag:'PV hoy',
      formula:'Σ PV semanas hasta hoy',
      calc:v.pvAcumHoy.toFixed(1)+' hrs acumuladas planificadas hasta hoy',
      desc:'Cuánto debería haberse avanzado según el cronograma hasta la fecha de hoy',
      result:v.pctPVhoy.toFixed(1)+'%',
      cls:'fml-neu'
    },
    {
      tag:'AT',
      formula:'semanas desde KickOff hasta hoy',
      calc:fmt(v.psKick)+' → hoy = '+v.atWeeks.toFixed(1)+' semanas reales transcurridas',
      desc:'Tiempo real del calendario · no depende del avance, solo del reloj',
      result:'S'+v.atWeeks.toFixed(1),
      cls:'fml-neu'
    },
    {
      tag:'ES',
      formula:'semana donde PV acum = EV acum',
      calc:'PV acum en S'+v.esWeeks.toFixed(2)+' ≈ '+v.evAcumHoy.toFixed(1)+' hrs = EV actual → ES = S'+v.esWeeks.toFixed(2),
      desc:'Semana del cronograma equivalente a tu avance real · interpolada sobre la curva PV',
      result:'S'+v.esWeeks.toFixed(2),
      cls:'fml-neu'
    },
    {
      tag:'SV(t)',
      formula:'ES − AT',
      calc:v.esWeeks.toFixed(2)+' − '+v.atWeeks.toFixed(2)+' = '+(v.svt>0?'+':'')+v.svt.toFixed(2)+' semanas',
      desc:v.svt>=0?'Adelantado: avanzaste más de lo que el plan esperaba a esta altura':'Atrasado: avanzaste menos de lo que el plan esperaba a esta altura',
      result:(v.svt>0?'+':'')+v.svt.toFixed(2)+'w',
      cls:clsSv
    },
    {
      tag:'SPI(t)',
      formula:'ES ÷ AT',
      calc:v.esWeeks.toFixed(2)+' ÷ '+v.atWeeks.toFixed(2)+' = '+(v.spit===99?'∞':v.spit.toFixed(2)),
      desc:v.spit>=1?'Eficiencia alta — avanzas más rápido que el plan':
           v.spit>=0.7?'Eficiencia media — recuperable con esfuerzo':
           'Eficiencia baja — requiere acción urgente · por cada semana real solo avanzas '+v.spit.toFixed(2)+' semanas del plan',
      result:v.spit===99?'∞':v.spit.toFixed(2),
      cls:clsSpi
    },
    {
      tag:'EAC',
      formula:'Duración total ÷ SPI(t)',
      calc:v.rowsLen+' sem ÷ '+(v.spit===99?'∞':v.spit.toFixed(2))+' = '+Math.round(v.eacWeeks)+' semanas estimadas → '+fmt(v.eacDate),
      desc:'Duración proyectada si el equipo continúa al mismo ritmo actual hasta el final',
      result:Math.round(v.eacWeeks)+' sem',
      cls:clsSlip
    },
    {
      tag:'Fecha EAC',
      formula:'KickOff + EAC semanas',
      calc:fmt(v.psKick)+' + '+Math.round(v.eacWeeks)+'sem = '+fmt(v.eacDate)+'  ·  Contractual: '+fmt(v.peDue),
      desc:v.daysSlip>0?'+'+v.daysSlip+' días de retraso estimado vs entrega contractual':
           v.daysSlip<0?Math.abs(v.daysSlip)+' días antes de la entrega contractual':
           'Terminaría exactamente en la fecha contractual',
      result:v.daysSlip>0?'+'+v.daysSlip+'d':v.daysSlip<0?v.daysSlip+'d':'en fecha',
      cls:clsSlip
    },
    {
      tag:'P(fecha)',
      formula:'f(SPI, días restantes)',
      calc:'SPI='+(v.spit===99?'∞':v.spit.toFixed(2))+' · '+Math.max(Math.round((v.peDue-TODAY)/86400000),0)+'d hasta contractual'+(v.peDue<TODAY&&v.pctEVhoy<100?' · fecha vencida → máx 15%':''),
      desc:'Probabilidad de terminar en o antes de la fecha contractual · se penaliza si la fecha ya venció',
      result:v.prob+'%',
      cls:clsProb
    },
  ];

  const tbody = document.getElementById('fmlTable');
  if(!tbody) return;
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td style="width:80px"><span class="fml-tag">${r.tag}</span></td>
      <td style="width:160px"><span class="fml-formula">${r.formula}</span></td>
      <td style="width:300px"><span class="fml-calc">${r.calc}</span></td>
      <td><span class="fml-desc">${r.desc}</span></td>
      <td style="width:80px;text-align:right"><span class="fml-result ${r.cls}">${r.result}</span></td>
    </tr>`).join('');
}

function diasLab(ini,fin){
  let c=0,cur=new Date(ini);
  while(cur<=fin){if(cur.getDay()>0&&cur.getDay()<6)c++;cur=new Date(cur.getTime()+86400000);}
  return Math.max(c,1);
}
function diasLabSem(ti,tf,ws,we){
  const a=new Date(Math.max(ti,ws)),b=new Date(Math.min(tf,we));
  if(a>b)return 0;return diasLab(a,b);
}

function lunEs(dt){const d=new Date(dt);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d;}

// ═══════════════════════════════════════════════════
// ALGORITMO CURVA S — EXACTO AL EXCEL
// Kick Off: HRS_TURNO(8h) / N_kickoff tareas, solo en su semana
// Resto: (días_lab_semana / días_lab_total) × (días_lab_total × HRS_DIA)
//      = días_lab_semana × HRS_DIA  (simplificado)
// PV_sem = suma hrs de tareas activas esa semana
// EV_sem = suma (hrs × avance)
// ═══════════════════════════════════════════════════
function calcCurva(fases,kickoffStr,finRealStr){
  const allSubs=fases.flatMap(f=>f.subtasks.map(s=>({...s,fase:f.fase})));
  const nKick=allSubs.filter(s=>s.kickoff).length||1;
  const hrsKick=HRS_TURNO/nKick; // 1.6 para 5 tareas

  // Pre-calcular horas totales por tarea
  allSubs.forEach(s=>{
    const ti=D(s.ini),tf=D(s.fin);
    s._dl=diasLab(ti,tf);
    s._hrsTotal=s.kickoff?hrsKick:s._dl*HRS_DIA;
  });

  // Semanas
  const psKick=D(kickoffStr),peReal=D(finRealStr);
  const semanas=[];let ws=new Date(lunEs(psKick));
  while(ws<=new Date(peReal.getTime()+7*86400000)){semanas.push(new Date(ws));ws=new Date(ws.getTime()+7*86400000);}

  const rows=[];
  for(let i=0;i<semanas.length;i++){
    const ws2=semanas[i],we=new Date(ws2.getTime()+6*86400000);
    let pv=0,ev=0,n=0;
    allSubs.forEach(s=>{
      const ti=D(s.ini),tf=D(s.fin);
      if(s.kickoff){
        if(ti>=ws2&&ti<=we){pv+=s._hrsTotal;ev+=s._hrsTotal*(s.av||0);n++;}
      }else{
        const dl=diasLabSem(ti,tf,ws2,we);
        if(!dl)return;
        const hrs=dl*HRS_DIA;
        pv+=hrs;ev+=hrs*(s.av||0);n++;
      }
    });
    rows.push({idx:i+1,ws:ws2,n,pv:Math.round(pv*10)/10,ev:Math.round(ev*10)/10});
  }

  const totalPV=rows.reduce((s,r)=>s+r.pv,0);
  let pa=0,ea=0;
  rows.forEach(r=>{pa+=r.pv;ea+=r.ev;
    r.pvA=Math.round(pa*10)/10;r.evA=Math.round(ea*10)/10;
    r.pctPV=totalPV>0?Math.round(pa/totalPV*1000)/10:0;
    r.pctEV=totalPV>0?Math.round(ea/totalPV*1000)/10:0;
  });
  return{rows,totalPV,allSubs,hrsKick};
}

function calcES(rows,evAcumHoy,totalPV){
  const pctEV=totalPV>0?evAcumHoy/totalPV*100:0;
  if(pctEV<=0)return 0;
  if(pctEV>=100)return rows.length;
  for(let i=1;i<rows.length;i++){
    if(rows[i].pctPV>=pctEV){
      const p=rows[i-1],c=rows[i];
      const f=(pctEV-p.pctPV)/Math.max(c.pctPV-p.pctPV,.001);
      return p.idx-1+f;
    }
  }
  return rows.length;
}

function buscar(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  document.getElementById('serr').textContent='';
  if(!q){document.getElementById('serr').textContent='Ingresa un número de pedido.';return;}
  const m=CATALOGO.filter(p=>p.name.toLowerCase().includes(q)||p.gid.includes(q));
  if(!m.length){document.getElementById('serr').textContent=`No encontrado: "${q}"`;return;}
  const proj=m[0];
  if(!DEMO[proj.gid]){document.getElementById('serr').textContent='Datos de este proyecto aún no cargados — pronto disponible.';return;}
  renderDash(proj,DEMO[proj.gid].fases);
}

let chartInst=null;
function renderDash(proj,fases){
  const {rows,totalPV,allSubs,hrsKick}=calcCurva(fases,proj.kickoff,proj.finReal);
  const psKick=D(proj.kickoff),peDue=D(proj.due),peReal=D(proj.finReal);

  // Semana actual
  const rowsHoy=rows.filter(r=>r.ws<=TODAY);
  const rHoy=rowsHoy.length?rowsHoy[rowsHoy.length-1]:rows[0];
  const evAcumHoy=rHoy.evA,pvAcumHoy=rHoy.pvA;
  const pctEVhoy=rHoy.pctEV,pctPVhoy=rHoy.pctPV;
  const atWeeks=Math.max(Dw(psKick,TODAY),0);

  // ES, SPI(t), SV(t)
  const esWeeks=calcES(rows,evAcumHoy,totalPV);
  const svt=parseFloat((esWeeks-atWeeks).toFixed(2));
  const spit=atWeeks>0?parseFloat((esWeeks/atWeeks).toFixed(2)):pctEVhoy>0?99:0;

  // EAC
  const totalWeeks=rows.length;
  const eacWeeks=spit>0&&spit<90?totalWeeks/spit:totalWeeks;
  const eacDate=new Date(psKick.getTime()+eacWeeks*7*86400000);
  const daysSlip=Math.round(Dd(peDue,eacDate));

  // Probabilidad
  let prob=50;
  if(pctEVhoy>=100)prob=100;
  else if(spit<=0)prob=20;
  else{
    const dL=Math.max(Dd(TODAY,peDue),0);
    const tB=Math.min(dL/Math.max(Dd(psKick,peDue),1)*20,20);
    const base=Math.min(Math.max((spit-.3)/1.7*100,5),95);
    prob=Math.min(Math.round(base+tB),99);
    if(peDue<TODAY&&pctEVhoy<100)prob=Math.min(prob,15);
  }
  const pc=prob>=70?'#16a34a':prob>=40?'#d97706':'#dc2626';
  const isOverdue=peDue<TODAY&&pctEVhoy<100;
  const stTxt=pctEVhoy>=100?'Terminado':isOverdue?'Vencido':svt>=0?'Adelantado':'Atrasado';
  const stCls=pctEVhoy>=100?'b-info':isOverdue?'b-bad':svt>=0?'b-ok':'b-warn';

  document.getElementById('ph').innerHTML=`
    <div>
      <h2>${proj.name}</h2>
      <div class="meta">
        📅 Kick Off: <span>${fmt(psKick)}</span> &nbsp;·&nbsp;
        🏁 Entrega contractual: <span>${fmt(peDue)}</span> &nbsp;·&nbsp;
        🔚 Fin real: <span>${fmt(peReal)}</span><br>
        ⏱ Duración: <span>S${rows.length} semanas (${Math.round(Dd(psKick,peReal))} días)</span> &nbsp;·&nbsp;
        📊 Semana actual: <span>S${rowsHoy.length} de S${rows.length}</span> &nbsp;·&nbsp;
        📋 Total PV: <span>${totalPV.toFixed(0)} hrs</span>
      </div>
    </div>
    <span class="badge ${stCls}">${stTxt}</span>`;

  document.getElementById('dg').innerHTML=`
    <div class="dc"><div class="dl">📌 Inicio Kick Off</div><div class="dv">${fmt(psKick)}</div><div class="ds">Turno 8h total · ${hrsKick.toFixed(2)}h/tarea</div></div>
    <div class="dc"><div class="dl">🏁 Entrega contractual</div><div class="dv" style="color:${peDue<TODAY?'#dc2626':'#16a34a'}">${fmt(peDue)}</div><div class="ds">${peDue<TODAY?'⚠ VENCIDA':'✓ En plazo'}</div></div>
    <div class="dc"><div class="dl">🔚 Fin real proyecto</div><div class="dv">${fmt(peReal)}</div><div class="ds">Última subtarea del proyecto</div></div>
    <div class="dc"><div class="dl">📊 EAC estimado</div><div class="dv" style="color:${daysSlip>0?'#dc2626':daysSlip<0?'#16a34a':'#0f172a'}">${fmt(eacDate)}</div><div class="ds">${daysSlip>0?`+${daysSlip}d vs contractual`:daysSlip<0?`${Math.abs(daysSlip)}d antes`:'En fecha'}</div></div>`;

  // metodologia oculta

  document.getElementById('kr').innerHTML=`
    <div class="kpi" style="--c:#16a34a"><div class="kl">EV — Hrs ganadas</div><div class="kv">${evAcumHoy.toFixed(0)}h</div><div class="ks">${pctEVhoy}%</div><div class="kf">PV sem × %avance</div></div>
    <div class="kpi" style="--c:#2563eb"><div class="kl">PV — Hrs planificadas</div><div class="kv">${pvAcumHoy.toFixed(0)}h</div><div class="ks">${pctPVhoy}%</div><div class="kf">días lab × 8.4h</div></div>
    <div class="kpi" style="--c:${svt>=0?'#16a34a':'#dc2626'}"><div class="kl">SV(t)</div><div class="kv">${svt>0?'+':''}${svt}w</div><div class="ks">${svt>=0?'adelantado':'atrasado'}</div><div class="kf">ES − AT</div></div>
    <div class="kpi" style="--c:${spit>=1?'#16a34a':spit>=0.7?'#d97706':'#dc2626'}"><div class="kl">SPI(t)</div><div class="kv">${spit===99?'∞':spit.toFixed(2)}</div><div class="ks">${spit>=1?'alta efic.':spit>=0.7?'media':'baja'}</div><div class="kf">ES / AT</div></div>
    <div class="kpi" style="--c:#7c3aed"><div class="kl">ES</div><div class="kv">S${esWeeks.toFixed(1)}</div><div class="ks">sem. equiv.</div><div class="kf">PV acum = EV acum</div></div>
    <div class="kpi" style="--c:${daysSlip>0?'#dc2626':daysSlip<0?'#16a34a':'#2563eb'}"><div class="kl">EAC</div><div class="kv">S${Math.round(eacWeeks)}</div><div class="ks">${fmts(eacDate)}</div><div class="kf">${daysSlip!==0?(daysSlip>0?'+':'')+daysSlip+'d vs contractual':'en fecha'}</div></div>`;

  document.getElementById('pc').innerHTML=`
    <div><div class="pn" style="color:${pc}">${prob}%</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">prob. terminar en fecha contractual</div>
    <div class="pbar"><div class="pbarf" style="width:${prob}%;background:${pc}"></div></div></div>
    <div class="pi"><h4>Evaluación del cronograma</h4><p>
      <b>SPI(t)=${spit===99?'∞':spit.toFixed(2)}</b> → ${spit>=1?'Ritmo superior al plan':spit>=0.7?'Ritmo moderado, recuperable':'Ritmo bajo, requiere acción'}<br>
      <b>Horas ganadas:</b> ${evAcumHoy.toFixed(1)} / ${totalPV.toFixed(0)} hrs (${pctEVhoy}%)<br>
      <b>Días hasta entrega contractual:</b> ${Math.max(Math.round(Dd(TODAY,peDue)),0)} días (${fmt(peDue)})<br>
      <b>EAC:</b> ${fmt(eacDate)} ${daysSlip!==0?`(${daysSlip>0?'+':''}${daysSlip}d vs contractual)`:''}<br>
      <b>Trabajo restante:</b> ${(totalPV-evAcumHoy).toFixed(0)} hrs en ${Math.max(Math.round(Dd(TODAY,peReal)),0)} días
    </p></div>`;

  // GRÁFICO
  const dueIdx=rows.findIndex(r=>r.ws>=peDue);
  const dueI=dueIdx>=0?dueIdx:rows.length-1;
  const todayI=rowsHoy.length-1;

  if(chartInst){chartInst.destroy();}
  chartInst=new Chart(document.getElementById('chartS'),{
    type:'line',
    data:{
      labels:rows.map(r=>`S${r.idx} ${fmts(r.ws)}`),
      datasets:[
        {label:'PV %',data:rows.map(r=>r.pctPV),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.06)',borderWidth:2,borderDash:[6,4],tension:0.3,pointRadius:2,fill:true,spanGaps:false},
        {label:'EV %',data:rows.map(r=>r.ws<=TODAY?r.pctEV:null),borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.06)',borderWidth:2.5,tension:0.2,pointRadius:2,fill:true,spanGaps:false},
        {label:'ES',data:rows.map((r,i)=>i<=todayI?pctEVhoy:null),borderColor:'#d97706',backgroundColor:'transparent',borderWidth:2,borderDash:[3,3],tension:0,pointRadius:0,spanGaps:false},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#0f172a',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#f8fafc',bodyColor:'#94a3b8',
          titleFont:{family:'IBM Plex Mono',size:10},bodyFont:{family:'IBM Plex Mono',size:10},
          callbacks:{title:items=>items[0].label,
            label:ctx=>{
              if(ctx.parsed.y===null)return null;
              const r=rows[ctx.dataIndex];
              if(ctx.datasetIndex===0)return `PV: ${ctx.parsed.y}% (${r.pvA.toFixed(0)} hrs acum)`;
              if(ctx.datasetIndex===1)return `EV: ${ctx.parsed.y}% (${r.evA.toFixed(0)} hrs acum)`;
              return `ES: S${esWeeks.toFixed(1)} (semana donde PV=EV)`;
            }
          }
        },
        annotation:{annotations:{
          tl:{type:'line',xMin:todayI,xMax:todayI,borderColor:'rgba(100,116,139,.5)',borderWidth:1,borderDash:[4,4],label:{display:true,content:'HOY',color:'#64748b',font:{size:8,family:'IBM Plex Mono'},position:'start'}},
          dl:{type:'line',xMin:dueI,xMax:dueI,borderColor:'rgba(220,38,38,.6)',borderWidth:1.5,borderDash:[3,3],label:{display:true,content:'ENTREGA',color:'#dc2626',font:{size:8,family:'IBM Plex Mono'},position:'end'}},
        }}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:8,family:'IBM Plex Mono'},maxRotation:45,autoSkip:true,maxTicksLimit:20},grid:{color:'rgba(0,0,0,.03)'},
          title:{display:true,text:`Semanas desde Kick Off (${fmt(psKick)})`,color:'#94a3b8',font:{size:9,family:'IBM Plex Mono'}}},
        y:{min:0,max:100,ticks:{color:'#94a3b8',font:{size:9,family:'IBM Plex Mono'},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.03)'},

      }

  });

  // TABLA SEMANAL
  const tbs=document.getElementById('tbs');tbs.innerHTML='';
  rows.filter(r=>r.ws<=TODAY).forEach(r=>{
    const atW=parseFloat(Dw(psKick,r.ws).toFixed(1));

  // Render formulas with real project values

  const p=document.getElementById('fmlPanel');
  const a=btn.querySelector('.fml-arr');
  p.classList.toggle('open');
  a.textContent=p.classList.contains('open')?'▾':'▸';
}

function renderFormulas(vals){
  // vals = {evReal, pvToday, totalPV, evAcumHoy, pvAcumHoy,
  //         pctEVhoy, pctPVhoy, atWeeks, esWeeks, svt, spit,
  //         eacWeeks, eacDate, daysSlip, prob, hrsKick,
  //         psKick, peDue, peReal, rowsLen}
  const v = vals;
  const fmt2 = n => Math.round(n*100)/100;
  const fmtPct = n => n.toFixed(1)+'%';
  const fmtW = n => n.toFixed(2)+' sem';
  const clsSpi = v.spit>=1?'fml-ok':v.spit>=0.7?'fml-warn':'fml-bad';
  const clsSv  = v.svt>=0?'fml-ok':'fml-bad';
  const clsSlip= v.daysSlip<=0?'fml-ok':v.daysSlip<=14?'fml-warn':'fml-bad';
  const clsProb= v.prob>=70?'fml-ok':v.prob>=40?'fml-warn':'fml-bad';

  const rows = [
    {
      tag:'PV sem',
      formula:`42h ÷ N tareas activas`,
      calc:`KickOff = ${HRS_TURNO}h ÷ ${v.nKick} tareas = ${(HRS_TURNO/v.nKick).toFixed(2)}h/tarea · Resto = días lab × ${HRS_DIA.toFixed(1)}h/día`,
      desc:'Horas planificadas distribuidas entre tareas activas cada semana',
      result:`${v.totalPV.toFixed(0)} hrs total`,
      cls:'fml-neu'
    },
    {
      tag:'EV sem',
      formula:'PV sem × % avance tarea',
      calc:`EV acum hoy = ${v.evAcumHoy.toFixed(1)} hrs de ${v.totalPV.toFixed(0)} hrs totales`,
      desc:'Horas realmente ganadas · campo "Avance Tarea" de Asana por cada subtarea',
      result:fmtPct(v.pctEVhoy),
      cls:'fml-neu'
    },
    {
      tag:'PV hoy',
      formula:'Σ PV semanas hasta hoy',
      calc:`${v.pvAcumHoy.toFixed(1)} hrs acumuladas = ${fmtPct(v.pctPVhoy)} del total`,
      desc:'Cuánto debería haberse avanzado según el plan hasta hoy',
      result:fmtPct(v.pctPVhoy),
      cls:'fml-neu'
    },
    {
      tag:'AT',
      formula:'semanas desde KickOff hasta hoy',
      calc:`${fmt(v.psKick)} → ${fmt(TODAY)} = ${v.atWeeks.toFixed(1)} semanas reales`,
      desc:'Tiempo real transcurrido · el reloj del proyecto',
      result:`S${v.atWeeks.toFixed(1)}`,
      cls:'fml-neu'
    },
    {
      tag:'ES',
      formula:'semana donde PV acum = EV acum',
      calc:`S${v.esWeeks.toFixed(2)} es donde PV acum = ${v.evAcumHoy.toFixed(1)} hrs (EV hoy)`,
      desc:'Qué semana del plan equivale a tu avance real · interpolado sobre la curva PV',
      result:`S${v.esWeeks.toFixed(2)}`,
      cls:'fml-neu'
    },
    {
      tag:'SV(t)',
      formula:'ES − AT',
      calc:`${v.esWeeks.toFixed(2)} − ${v.atWeeks.toFixed(2)} = ${v.svt>0?'+':''}${v.svt.toFixed(2)} semanas`,
      desc:v.svt>=0?'Adelantado: el trabajo hecho equivale a una semana futura del plan':'Atrasado: el trabajo hecho equivale a una semana pasada del plan',
      result:`${v.svt>0?'+':''}${v.svt.toFixed(2)}w`,
      cls:clsSv
    },
    {
      tag:'SPI(t)',
      formula:'ES ÷ AT',
      calc:`${v.esWeeks.toFixed(2)} ÷ ${v.atWeeks.toFixed(2)} = ${v.spit===99?'∞':v.spit.toFixed(2)}`,
      desc:v.spit>=1?'Eficiencia alta — avanzas más rápido que el plan':
           v.spit>=0.7?'Eficiencia media — recuperable con esfuerzo':
           'Eficiencia baja — requiere acción urgente',
      result:v.spit===99?'∞':v.spit.toFixed(2),
      cls:clsSpi
    },
    {
      tag:'EAC',
      formula:'Duración total ÷ SPI(t)',
      calc:`${v.rowsLen} sem ÷ ${v.spit===99?'∞':v.spit.toFixed(2)} = ${Math.round(v.eacWeeks)} semanas → ${fmt(v.eacDate)}`,
      desc:'Duración proyectada si continúas al mismo ritmo actual',
      result:`${Math.round(v.eacWeeks)} sem`,
      cls:clsSlip
    },
    {
      tag:'Fecha EAC',
      formula:'KickOff + EAC semanas',
      calc:`${fmt(v.psKick)} + ${Math.round(v.eacWeeks)}sem = ${fmt(v.eacDate)} · Contractual: ${fmt(v.peDue)}`,
      desc:v.daysSlip>0?`+${v.daysSlip} días de retraso vs entrega contractual`:
           v.daysSlip<0?`${Math.abs(v.daysSlip)} días antes de la entrega contractual`:
           'Terminaría exactamente en la fecha contractual',
      result:v.daysSlip>0?`+${v.daysSlip}d`:v.daysSlip<0?`${v.daysSlip}d`:'en fecha',
      cls:clsSlip
    },
    {
      tag:'P(fecha)',
      formula:'f(SPI, días restantes)',
      calc:`SPI=${v.spit===99?'∞':v.spit.toFixed(2)} · ${Math.max(Math.round(Dd(TODAY,v.peDue)),0)}d hasta contractual · ${v.peDue<TODAY&&v.pctEVhoy<100?'fecha vencida → máx 15%':'probabilidad calculada'}`,
      desc:'Probabilidad de terminar en o antes de la fecha contractual · disminuye si la fecha ya venció',
      result:`${v.prob}%`,
      cls:clsProb
    },
  ];

  const tbody = document.getElementById('fmlTable');
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td style="width:80px"><span class="fml-tag">${r.tag}</span></td>
      <td style="width:180px"><span class="fml-formula">${r.formula}</span></td>
      <td style="width:280px"><span class="fml-calc">${r.calc}</span></td>
      <td><span class="fml-desc">${r.desc}</span></td>
      <td style="width:80px;text-align:right"><span class="fml-result ${r.cls}">${r.result}</span></td>
    </tr>`).join('');
}

</script>
</body>
</html>
